<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth2050</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: #0a0a0f;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 25px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header h1 {
      color: #00f0ff;
      font-size: 18px;
    }

    .main {
      flex: 1;
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    .video-area {
      flex: 3;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 20px rgba(0,255,255,0.2);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remote {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .local {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 180px;
      height: 120px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .sidebar {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .chat-box {
      height: 200px;
      overflow-y: auto;
      font-size: 12px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .btn {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.05);
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      box-shadow: 0 0 10px #00f0ff;
      transform: translateY(-2px);
    }

    .btn.danger:hover {
      box-shadow: 0 0 10px red;
    }

    .status {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      color: #00f0ff;
    }

  </style>
</head>

<body>

  <header>
    <h1>Earth2050</h1>
    <div>⚙️ Profile</div>
  </header>

  <div class="main">

    <div class="video-area">
      <div class="status">Connecting...</div>
      <video class="remote" autoplay></video>
      <video class="local" autoplay muted></video>
    </div>

    <div class="sidebar">
      <div class="card">
        <h3>Stranger Info</h3>
        <p>🌍 Unknown</p>
        <p>💡 Interest: Tech</p>
      </div>

      <div class="card">
        <h3>Chat</h3>
        <div class="chat-box" id="chat"></div>
        <input type="text" placeholder="Type a message..." style="width:100%;margin-top:10px;padding:8px;border-radius:8px;border:none;background:#111;color:white;">
      </div>
    </div>

  </div>

  <div class="controls">
    <button class="btn">🎤</button>
    <button class="btn">🎥</button>
    <button class="btn">🔁 Next</button>
    <button class="btn danger">🚫 Report</button>
  </div>

</body>
</html>
